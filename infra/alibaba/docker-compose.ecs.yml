services:
  aegisops-autopilot:
    image: ${AEGISOPS_IMAGE:?set AEGISOPS_IMAGE}
    restart: unless-stopped
    ports:
      - "${PORT:-8787}:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      ALIBABA_CLOUD_REGION: ${ALIBABA_CLOUD_REGION:-ap-southeast-1}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8787/api/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
